name: offroad_vehicle_monitoring
description: A Flutter IoT simulation app for an Offroad Vehicle Monitoring System.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0
  mqtt_client: ^10.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/tire_bg.jpg

